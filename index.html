<html lang="en" class="no-js">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"> 
		<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
		<title>NoQLiao</title>
		
		<link rel="shortcut icon" href="../favicon.ico"> 
		<link rel="stylesheet" type="text/css" href="css/default.css" />
		<link rel="stylesheet" type="text/css" href="css/component.css" />
		<link rel="stylesheet" type="text/css" href="css/animations.css" />
		<script src="js/modernizr.custom.js"></script>
	</head>
	<body>
		<div id="pt-main" class="pt-perspective">
			<div class="pt-page pt-page-1">
				<h1>
					<span>presenting</span>
					<img src="images/icon_logo_transparent.png" alt="NoQLiao Logo">
				</h1>
			</div>
			<div class="pt-page pt-page-2">
				<h1>
					Get In, Get Out
					<br><strong>Scan and go-- no waiting in line!</strong>
				</h1>

			</div>
			<div class="pt-page pt-page-3">
				<h1>
					Intuitive Interface
					<br><strong>Even your <i>ahmah</i> can use it</strong>
					<img src="images/cart.png" alt="App Payment">

				</h1>
			</div>
			<div class="pt-page pt-page-4">
				<h1>
					One-Step Payment
					<br><strong>Purchasing without your wallet</strong>
					<img src="images/payment.png" alt="App Payment">
				</h1>
			</div>
		</div>

		<div class="pt-message">
			<p>Your browser does not support CSS animations.</p>
		</div>

		<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
		<script src="js/jquery.dlmenu.js"></script>
		<script src="js/pagetransitions.js"></script>
		
		<script>
		$(document).keydown(function(e){
			if (e.keyCode==32){
                PageTransitions.nextPage(1);
			}
		});
		</script>		
	</body>
</html>
